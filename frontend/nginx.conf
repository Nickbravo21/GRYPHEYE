server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React static files; fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the backend service
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Allow large file uploads (video)
        client_max_body_size 500M;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
    }

    # Proxy static output video files
    location /outputs/ {
        proxy_pass       http://backend:8000/outputs/;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
